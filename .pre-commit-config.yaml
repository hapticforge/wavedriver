repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: no-config-data
        name: Block committing .config/wavedriver/ data
        language: system
        entry: bash -c 'git diff --cached --name-only | grep -q "^\.config/wavedriver/" && echo "ERROR: Do not commit personal config/history data from ~/.config/wavedriver/" && exit 1 || true'
        pass_filenames: false
